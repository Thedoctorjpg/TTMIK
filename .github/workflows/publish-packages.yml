name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'packages-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm publish --workspace ttmik-webhook --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --workspace ttmik-heal-skills --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}