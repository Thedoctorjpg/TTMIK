<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Editor Ultimate • FFmpeg.wasm</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a14; color: #eee; margin: 0; padding: 20px; }
    h1 { color: #00ffcc; text-align: center; }
    .container { max-width: 1300px; margin: 0 auto; }
    .upload-area { border: 3px dashed #00ffcc; border-radius: 16px; padding: 50px; margin: 20px auto; cursor: pointer; text-align: center; }
    .upload-area:hover { background: #1a1a2e; border-color: #00ffaa; }
    .panel { background: #111827; padding: 20px; border-radius: 12px; margin: 20px 0; }
    .preview-container { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
    video { max-width: 480px; background: #000; border-radius: 10px; }
    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; }
    label { display: block; margin-bottom: 6px; }
    input, select { width: 100%; }
    .value { float: right; color: #00ffcc; }
    button { background: #00ffcc; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 5px; }
    button:hover:not(:disabled) { background: #00ffaa; }
    button.red { background: #ef4444; color: white; }
    .preset-btn { background: #334155; color: white; }
    .preset-btn.active { background: #00ffcc; color: black; }
    .progress { width: 80%; margin: 20px auto; height: 16px; background: #222; border-radius: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #00ffcc, #00ccff); width: 0%; transition: width 0.2s; }
    .status { text-align: center; font-weight: bold; min-height: 32px; color: #00ffcc; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Video Editor Ultimate</h1>
    <p><strong>FFmpeg.wasm</strong> — Crop • Presets • Trim • Text • Batch + Cancel</p>

    <div id="projectBanner" class="panel" style="display:none; border:1px solid #00ffcc;">
      <h3 id="projectTitle" style="margin:0 0 8px; color:#00ffcc;">Melbourne Lantern</h3>
      <p id="projectMeta" style="margin:0 0 8px; color:#94a3b8;"></p>
      <p id="projectTimeline" style="margin:0; font-family:monospace; font-size:0.9rem; color:#cbd5e1; word-break:break-all;"></p>
    </div>

    <div class="upload-area" id="uploadArea">
      <h2>Drop video(s) here or click to upload</h2>
      <input type="file" id="fileInput" accept="video/*" multiple style="display:none;">
    </div>

    <div class="panel" id="editorPanel" style="display:none;">
      <div class="preview-container">
        <div><p><strong>Original</strong></p><video id="originalVideo" controls></video></div>
        <div><p><strong>Preview (Last)</strong></p><video id="resultVideo" controls></video></div>
      </div>

      <div class="controls-grid">
        <div>
          <label>Preset Filters</label>
          <button class="preset-btn active" data-preset="none">None</button>
          <button class="preset-btn" data-preset="vintage">Vintage</button>
          <button class="preset-btn" data-preset="cinematic">Cinematic</button>
          <button class="preset-btn" data-preset="noir">Noir</button>
          <button class="preset-btn" data-preset="warm">Warm</button>
        </div>

        <div class="input-group">
          <label>Crop (x y w h)</label>
          <input type="number" id="cropX" value="0" style="width:24%">
          <input type="number" id="cropY" value="0" style="width:24%">
          <input type="number" id="cropW" placeholder="W" style="width:24%">
          <input type="number" id="cropH" placeholder="H" style="width:24%">
        </div>

        <div class="input-group">
          <label>Trim</label>
          Start (s): <input type="number" id="trimStart" step="0.1" value="0" style="width:80px">
          Duration (s): <input type="number" id="trimDur" step="0.1" style="width:80px">
        </div>

        <div class="input-group">
          <label>Text Overlay / Watermark</label>
          <input type="text" id="overlayText" placeholder="e.g. © My Video 2026">
          <select id="textPosition">
            <option value="10:10">Top Left</option>
            <option value="W/2-tw/2:10">Top Center</option>
            <option value="W-tw-10:10">Top Right</option>
            <option value="10:H-th-10">Bottom Left</option>
            <option value="W/2-tw/2:H-th-10">Bottom Center</option>
          </select>
        </div>

        <div>
          <label><input type="checkbox" id="grayscale" checked> Grayscale</label>
          <label>Brightness <span class="value" id="brightVal">0</span></label>
          <input type="range" id="brightness" min="-1" max="1" step="0.05" value="0">
        </div>
      </div>
    </div>

    <div class="progress" id="progressContainer" style="display:none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status"></div>

    <div style="text-align:center; margin:20px;">
      <button id="convertBtn" disabled>Export All Video(s)</button>
      <button id="cancelBtn" class="red" style="display:none;">Cancel Processing</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js"></script>
  <script>
    const { FFmpeg } = ffmpeg;
    let ffmpegInstance = null;
    let filesToProcess = [];
    let isCancelled = false;

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const originalVideo = document.getElementById('originalVideo');
    const resultVideo = document.getElementById('resultVideo');
    const convertBtn = document.getElementById('convertBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const editorPanel = document.getElementById('editorPanel');
    const progressBar = document.getElementById('progressBar');
    const statusEl = document.getElementById('status');

    let activePreset = 'none';
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activePreset = btn.dataset.preset;
      });
    });

    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    uploadArea.addEventListener('dragover', e => e.preventDefault());
    uploadArea.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

    function handleFiles(fileList) {
      filesToProcess = Array.from(fileList);
      if (!filesToProcess.length) return;

      originalVideo.src = URL.createObjectURL(filesToProcess[0]);
      editorPanel.style.display = 'block';
      convertBtn.disabled = false;
      statusEl.textContent = `${filesToProcess.length} file(s) ready`;
    }

    async function loadFFmpeg() {
      if (ffmpegInstance) return ffmpegInstance;
      statusEl.textContent = "Loading FFmpeg.wasm...";
      ffmpegInstance = new FFmpeg();
      await ffmpegInstance.load({
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
        wasmPath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
      });
      return ffmpegInstance;
    }

    async function cleanupFiles(ffmpeg, inputName, outputName) {
      try { await ffmpeg.deleteFile(inputName); } catch(e){}
      try { await ffmpeg.deleteFile(outputName); } catch(e){}
    }

    convertBtn.addEventListener('click', async () => {
      isCancelled = false;
      convertBtn.disabled = true;
      cancelBtn.style.display = 'inline-block';
      document.getElementById('progressContainer').style.display = 'block';
      progressBar.style.width = '0%';

      const ffmpeg = await loadFFmpeg();

      for (let i = 0; i < filesToProcess.length; i++) {
        if (isCancelled) {
          statusEl.textContent = "❌ Processing cancelled by user";
          break;
        }

        const file = filesToProcess[i];
        const inputName = `input_${i}.mp4`;
        const outputName = `output_${i}.mp4`;

        statusEl.textContent = `Processing ${i+1}/${filesToProcess.length}: ${file.name}`;

        ffmpeg.on('progress', ({ progress }) => {
          if (!isCancelled) progressBar.style.width = `${Math.round(progress * 100)}%`;
        });

        try {
          await ffmpeg.writeFile(inputName, new Uint8Array(await file.arrayBuffer()));

          let vf = [];

          // Presets
          if (activePreset === 'vintage') vf.push('curves=vintage');
          else if (activePreset === 'cinematic') vf.push('colorgrade=shadows=-0.15:highlights=0.1');
          else if (activePreset === 'noir') vf.push('format=gray,curves=highlights=0.3');
          else if (activePreset === 'warm') vf.push('curves=r="0/0 0.6/0.7 1/1"');

          if (document.getElementById('grayscale').checked) vf.push('format=gray');

          const bright = document.getElementById('brightness').value;
          if (parseFloat(bright) !== 0) vf.push(`eq=brightness=${bright}`);

          // Crop
          const cw = document.getElementById('cropW').value;
          const ch = document.getElementById('cropH').value;
          if (cw && ch) {
            const cx = document.getElementById('cropX').value || 0;
            const cy = document.getElementById('cropY').value || 0;
            vf.push(`crop=${cw}:${ch}:${cx}:${cy}`);
          }

          // Text Overlay
          const text = document.getElementById('overlayText').value.trim();
          if (text) {
            const pos = document.getElementById('textPosition').value;
            vf.push(`drawtext=text='${text.replace(/'/g, "\\'")}':fontcolor=white:fontsize=48:x=${pos.split(':')[0]}:y=${pos.split(':')[1]}:borderw=3`);
          }

          const filterStr = vf.join(',');

          const args = ['-i', inputName];
          if (filterStr) args.push('-vf', filterStr);

          const start = document.getElementById('trimStart').value;
          const dur = document.getElementById('trimDur').value;
          if (start > 0) args.push('-ss', start);
          if (dur) args.push('-t', dur);

          args.push('-c:v', 'libx264', '-crf', '18', '-preset', 'medium', '-c:a', 'aac', '-b:a', '128k', outputName);

          await ffmpeg.exec(args);

          const data = await ffmpeg.readFile(outputName);
          const blob = new Blob([data.buffer], { type: 'video/mp4' });
          const resultURL = URL.createObjectURL(blob);

          resultVideo.src = resultURL;

          const a = document.createElement('a');
          a.href = resultURL;
          a.download = file.name.replace(/\.\w+$/, '_edited.mp4');
          a.click();

          await cleanupFiles(ffmpeg, inputName, outputName);

        } catch (err) {
          console.error(err);
        }
      }

      statusEl.textContent = isCancelled ? "Cancelled" : "✅ All videos processed!";
      progressBar.style.width = '100%';
      convertBtn.disabled = false;
      cancelBtn.style.display = 'none';
    });

    cancelBtn.addEventListener('click', () => {
      isCancelled = true;
      cancelBtn.style.display = 'none';
      statusEl.textContent = "Cancelling...";
    });

    async function bootMelbourneLanternProject() {
      const params = new URLSearchParams(window.location.search);
      const formatId = params.get('format');
      if (!formatId && params.get('project') !== 'melbourne-lantern') return;

      let edits = null;
      try {
        const res = await fetch('melbourne-lantern-edits.json');
        if (res.ok) edits = await res.json();
      } catch (_) { /* offline */ }

      const format = edits?.formats?.[formatId];
      const banner = document.getElementById('projectBanner');
      if (format) {
        banner.style.display = 'block';
        document.getElementById('projectTitle').textContent = format.label;
        document.getElementById('projectMeta').textContent =
          `${format.duration}s · ${format.aspect} · pins: ${(format.pins || []).join(' → ')}`;
        document.getElementById('projectTimeline').textContent = format.editOrder || '';
      } else if (formatId) {
        banner.style.display = 'block';
        document.getElementById('projectTitle').textContent = `Format: ${formatId}`;
      }

      const preset = params.get('preset') || format?.visualPreset;
      if (preset) {
        document.querySelectorAll('.preset-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.preset === preset);
        });
        activePreset = preset;
      }

      const overlay = params.get('overlay') || format?.overlay;
      if (overlay) document.getElementById('overlayText').value = overlay.replace(/\+/g, ' ');

      const overlayPos = params.get('overlayPos') || format?.overlayPosition;
      if (overlayPos) {
        const sel = document.getElementById('textPosition');
        for (const opt of sel.options) {
          if (opt.value === overlayPos) { sel.value = overlayPos; break; }
        }
      }

      const dur = params.get('duration') || (format?.duration ? String(format.duration) : '');
      if (dur) document.getElementById('trimDur').value = dur;

      const aspect = params.get('aspect') || format?.aspect;
      if (aspect === '9:16') {
        statusEl.textContent = 'Tip: crop to 1080×1920 for vertical Reels';
      } else if (aspect === '16:9') {
        statusEl.textContent = 'Tip: crop to 1920×1080 for Veil Lumen essay';
      }
    }

    bootMelbourneLanternProject();
  </script>
</body>
</html>
